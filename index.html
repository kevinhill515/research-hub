<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent stale-HTML-pinning-new-chunks problem: index.html is
         tiny and gets rewritten on every deploy to reference new
         hashed asset filenames. If the browser caches the OLD html,
         users hit 404s for chunks that no longer exist and the page
         hangs. Force a freshness check every load — the hashed
         assets it references are still cached normally so this only
         adds one ~3KB round-trip. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <title>Research Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
